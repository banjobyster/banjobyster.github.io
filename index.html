    <link rel="stylesheet" href="/bysters-fixtures.css" />
    <script>
      // Theme init before first paint: stored preference wins, else system.
      (function () {
        var t;
        try {
          t = localStorage.getItem("theme");
        } catch (e) {
          t = null;
        }
        if (t !== "light" && t !== "dark") {
          t =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
